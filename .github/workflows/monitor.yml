name: TicketPlus 釋票偵測

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: 查詢票券並通知（每次觸發後持續查 4 分半，每 60 秒一次）
        env:
          TP_TG_BOT_TOKEN: ${{ secrets.TP_TG_BOT_TOKEN }}
          TP_TG_CHAT_ID: ${{ secrets.TP_TG_CHAT_ID }}
        run: timeout 270 python3 monitor.py --interval 60 || true
